<p>Detects mixed-case Dockerfile instruction keywords.</p>
<ul>
    <li>Use either fully uppercase instruction keywords (for example, <code>FROM</code>)</li>
    <li>Or use fully lowercase instruction keywords (for example, <code>from</code>)</li>
    <li>Avoid mixed-case forms such as <code>EntryPoint</code> because they reduce readability</li>
</ul>
